name: Weekly Tests

on:
  schedule:
    - cron: "0 0 * * 6" # Runs every saturday at midnight
  pull_request:
    paths:
      - .github/workflows/weekly.yaml
permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cncf:
    name: CNCF conformance test
    strategy:
      fail-fast: false
      matrix:
        os: ["noble", "jammy"]
        arch: ["amd64"]
    runs-on: ['self-hosted', 'linux', '${{ matrix.arch }}', '${{ matrix.os }}', 'xlarge']
    env:
      TF_VAR_model: my-canonical-k8s
    steps:
    - name: Setup Astral UV
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
    - name: Install tox with UV
      run: uv tool install tox --with tox-uv
    - name: Setup operator environment
      uses: charmed-kubernetes/actions-operator@d8217ad61c15f746727a9d41563c13e9b9fe56e3 # main
      with:
        provider: lxd
        channel: latest/stable
        juju-channel: 3/stable
    - name: Checking out repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Install dependencies
      run: |
        sudo snap install juju-wait --classic
    - name: Setup cluster with terraform
      timeout-minutes: 15
      run: |
        tox -e deploy-terraform -- --model ${{env.TF_VAR_model}} --manifest-yaml ${{ github.workspace }}/tests/integration/terraform/default-manifest.yaml
    - name: Run CNCF conformance test
      run: |
        tox -e conformance -- DOCKER_REGISTRY_USERNAME=${{ secrets.DOCKER_REGISTRY_USERNAME }} DOCKER_REGISTRY_PASSWORD=${{ secrets.DOCKER_REGISTRY_PASSWORD }}
    - name: Upload CNCF conformance report artifact
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: sonobuoy-e2e-${{ env.test_name }}
        path: tests/conformance/sonobuoy_e2e.tar.gz
    - name: Tmate debugging session (self-hosted)
      if: ${{ failure() && github.event_name == 'pull_request' }}
      uses: canonical/action-tmate@bda82e73586a62bf621881aab872a527c8a46e2d # main
      timeout-minutes: 10
