name: Integration tests

on:
  pull_request:

jobs:
  charmcraft-channel:
    runs-on: ubuntu-24.04
    outputs:
      channel: ${{ steps.charmcraft.outputs.channel }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: charmcraft
        run: echo "channel=$(cat .charmcraft-channel)" >> $GITHUB_OUTPUT

  select-tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      amd64: ${{ steps.select.outputs.amd64 }}
      arm64: ${{ steps.select.outputs.arm64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Astral UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.11"
          python-version: "3.12"
      - name: Setup Python
        run: uv python install
      - name: Install tox with UV
        run: uv tool install tox --with tox-uv
      - name: Select tests
        id: select
        run: |
          list_modules() {
            ARCH=$1
            MODULES=$(tox -e integration -- --collect-only -q --arch "$ARCH" 2>/dev/null \
              | grep -E '<Module test_.*\.py>' \
              | sed -E 's/.*<Module (test_[^.]*)\.py>.*/\1/' \
              | sort -u)
            jq -c -R -s 'split("\n")[:-1]' <<< "${MODULES}"
          }
          amd64=$(list_modules amd64)
          arm64=$(list_modules arm64)
          echo "amd64=${amd64}" >> "$GITHUB_OUTPUT"
          echo "arm64=${arm64}" >> "$GITHUB_OUTPUT"

  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@011250c1cbc944fd99b1a16ebb995f55483a57b3 # main
    needs: [charmcraft-channel, select-tests]
    permissions:
      contents: read
      actions: write
    secrets: inherit
    strategy:
      matrix:
        arch:
          # built on azure, test on self-hosted
          - id: amd64
            builder-label: ubuntu-24.04
            tester-arch: AMD64
            tester-size: xlarge
            modules: ${{ needs.select-tests.outputs.amd64 }}
          # built on GitHub-hosted, test on self-hosted
          - id: arm64
            builder-label: ubuntu-24.04-arm
            tester-arch: ARM64
            tester-size: large
            modules: ${{ needs.select-tests.outputs.arm64 }}
    with:
      identifier: ${{ matrix.arch.id }}
      builder-runner-label: ${{ matrix.arch.builder-label }}
      charmcraft-channel: ${{ needs.charmcraft-channel.outputs.channel }}
      extra-arguments: >-
        ${{ matrix.arch.id == 'arm64' && ' --lxd-containers' || '' }}
      modules: ${{ matrix.arch.modules }}
      juju-channel: 3/stable
      provider: lxd
      self-hosted-runner: true
      self-hosted-runner-arch: ${{ matrix.arch.tester-arch }}
      self-hosted-runner-label: ${{ matrix.arch.tester-size }}
      test-timeout: 600
      test-tox-env: integration
      trivy-fs-enabled: false
      trivy-image-config: "trivy.yaml"
      tmate-debug: true
      with-uv: true

  integration-tests-resolute:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@011250c1cbc944fd99b1a16ebb995f55483a57b3 # main
    needs: [charmcraft-channel]
    permissions:
      contents: read
      actions: write
    secrets: inherit
    strategy:
      matrix:
        arch:
          - id: amd64
            builder-label: ubuntu-26.04
            tester-arch: AMD64
            tester-size: xlarge
            modules: '["test_k8s", "test_smoke", "test_dualstack", "test_ipv6_only", "test_openstack"]'
          - id: arm64
            builder-label: ubuntu-26.04-arm
            tester-arch: ARM64
            tester-size: xlarge
            modules: '["test_k8s", "test_smoke", "test_dualstack", "test_ipv6_only", "test_openstack"]'
    with:
      identifier: ${{ matrix.arch.id }}
      builder-runner-label: ${{ matrix.arch.builder-label }}
      charmcraft-channel: ${{ needs.charmcraft-channel.outputs.channel }}
      extra-arguments: >-
        ${{ matrix.arch.id == 'arm64' && ' --lxd-containers --series=resolute' || ' --series=resolute' }}
      modules: ${{ matrix.arch.modules }}
      juju-channel: 3/stable
      provider: lxd
      self-hosted-runner: true
      self-hosted-runner-arch: ${{ matrix.arch.tester-arch }}
      self-hosted-runner-label: ${{ matrix.arch.tester-size }}
      test-timeout: 900
      test-tox-env: integration
      trivy-fs-enabled: false
      trivy-image-config: "trivy.yaml"
      tmate-debug: true
      with-uv: true
      # this is a workaround since "resolute" is not supported in operator-workflows and hence 3.14 that comes with it
      python-version: 3.14
      # operator-workflows appends "noble" to the request labels by default. we need to change it to resolute
      self-hosted-runner-image: resolute
