name: Auto-update K8s charm libraries

on:
  schedule:
    - cron: "0 1 * * *"

jobs:
  charmcraft-channel:
    runs-on: ubuntu-24.04
    outputs:
      channel: ${{ steps.charmcraft.outputs.channel }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - id: charmcraft
      run: echo "channel=$(cat .charmcraft-channel)" >> $GITHUB_OUTPUT
  auto-update-libs:
    needs: [charmcraft-channel]
    uses: canonical/operator-workflows/.github/workflows/auto_update_charm_libs.yaml@c415a47cdc45a7c03f105863c03717939412480f # main
    secrets: inherit
    with:
      working-directory:  ./charms/worker/k8s
      charmcraft-channel: ${{ needs.charmcraft-channel.outputs.channel }}
