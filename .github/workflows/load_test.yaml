name: Load tests

on:
  schedule:
    - cron: "0 12 * * 0"

jobs:
  load-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@7fd34e293481827c89f3876c274f6e7bd6c0d873
    with:
      provider: lxd
      juju-channel: 3.3/stable
      load-test-enabled: true
      load-test-run-args: "-e LOAD_TEST_HOST=localhost"
    secrets: inherit
